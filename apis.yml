aid: klaxoon
name: Klaxoon
url: https://raw.githubusercontent.com/api-evangelist/klaxoon/refs/heads/main/apis.yml
description: >-
  Klaxoon is a collaborative platform that provides tools for team collaboration,
  brainstorming, meetings, and workshops. The platform includes features like boards,
  quizzes, surveys, and other interactive activities to enhance team productivity
  and engagement. Klaxoon publishes a developer portal with documentation for board
  integration, embedding, and enterprise audit and SCIM endpoints, but does not currently
  publish a public OpenAPI specification.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
type: Index
tags:
  - Collaboration
  - Meetings
  - Productivity
  - Team Collaboration
  - Workshops
  - Brainstorming
  - Whiteboard
created: '2024-01-01'
modified: '2026-04-28'
specificationVersion: '0.19'
apis:
  - aid: klaxoon:klaxoon-api
    name: Klaxoon API
    description: >-
      The Klaxoon API allows developers to integrate Klaxoon's collaborative features
      into their applications, enabling automation of board creation, activity management,
      and participant engagement. It includes the Board API, Activity Picker, Klaxoon
      Embed, Audit Logs API, SCIM API, and Participant Activity Report API.
    humanURL: https://developers.klaxoon.com
    tags:
      - Activities
      - Boards
      - Collaboration
      - Embed
      - SCIM
      - Audit
